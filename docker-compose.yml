version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hostel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hostel_maintenance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hostel_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hostel_maintenance
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: change_this_to_a_long_random_secret_in_production
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hostel_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data: